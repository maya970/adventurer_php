<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>转职</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="rpg-view-town standalone-rpg-body">
  <script>window.RPG_LOGIN_URL = 'login.html';</script>
  <div id="toast"></div>
  <nav class="town-nav" aria-label="页面导航"></nav>
  <div id="player-meta-bar" class="player-meta-bar"></div>
  <div class="town-overlay open">
    <div class="panel">
      <h1>转职</h1>
      <p class="panel-intro">首次选择体修或灵修，确认后锁定。日常查看与技能强化请使用「技能」页。</p>
      <p id="pc-current" class="panel-intro">载入中…</p>
      <div class="bag-toolbar">
        <label class="panel-intro" for="pc-select">选择职业：</label>
        <select id="pc-select" class="sc-guardian-skin-sel">
          <option value="">请选择</option>
          <option value="body">体修</option>
          <option value="spirit">灵修</option>
        </select>
        <button id="pc-confirm" class="town-dg-btn" type="button">确认转职（不可更改）</button>
      </div>
      <p id="pc-lock-note" class="panel-intro">提示：确认后无法再切换，需使用「遗忘仪式」并消耗曦光晶屑方可重选。</p>
      <p class="panel-intro"><a href="profession.html">返回技能页</a></p>
    </div>
  </div>
  <script src="js/common/api-client.js"></script>
  <script src="js/common/rpg-page.js"></script>
  <script src="js/common/player-meta-bar.js"></script>
  <script src="js/town/town-nav.js"></script>
  <script src="js/town/profession-change-page.js"></script>
</body>
</html>
